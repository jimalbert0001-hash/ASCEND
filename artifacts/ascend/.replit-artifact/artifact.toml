kind = "web"
previewPath = "/"
title = "ASCEND"
version = "1.0.0"
id = "artifacts/ascend"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23018

[services.development]
run = "pnpm --filter @workspace/ascend run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ascend", "run", "build" ]
publicDir = "artifacts/ascend/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23018"
BASE_PATH = "/"
